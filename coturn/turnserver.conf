# coturn config for Pair.
#
# Listens on 0.0.0.0 inside the container. Docker's port mapping forwards
# 3478/tcp, 3478/udp, and 50100-50200/udp from the host to the container.
# The router then remaps external 3481 → 3478 and 50100-50200 → 50100-50200.
#
# external-ip tells coturn to put the PUBLIC IP in XOR-MAPPED-ADDRESS and
# RELAY-ADDRESS attributes inside Allocate responses, so remote peers send
# relay traffic to YOUR_PUBLIC_IP:50100+ instead of the container's internal IP.
# The second value (YOUR_LAN_IP) is the host LAN IP — coturn needs both
# to correctly rewrite the addresses. Replace both before starting coturn.

listening-port=3478
listening-ip=0.0.0.0
external-ip=YOUR_PUBLIC_IP/YOUR_LAN_IP

# UDP relay port range — must match the docker-compose port map AND the
# router forwarding rule for external 50100-50200.
# NOTE: Windows reserves 49152-49551 and 50000-50059, so we use 50100+.
min-port=50100
max-port=50200

# Long-term credential mechanism (RFC 5389).
lt-cred-mech
fingerprint
realm=pair

user=pair:cbb325a9723628e480bb2190014d531c

# Security: prevent open-relay abuse.
no-multicast-peers
no-cli

# Logging.
log-file=stdout
simple-log
# verbose
